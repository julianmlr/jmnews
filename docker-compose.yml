services:
  jmnews:
    build: .
    image: jmnews:latest
    container_name: jmnews
    # The image's internal user `jmnews` has UID 1000; pin explicitly so the
    # bind-mounted ./data on the host needs exactly 1000:1000 ownership.
    # On first deploy: `mkdir -p data && chown -R 1000:1000 data` (see DEPLOY.md).
    user: "1000:1000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./jm_profile.md:/app/jm_profile.md:ro
    restart: unless-stopped
    # Default CMD is `run-daemon` (APScheduler). Override per spec's cron
    # approach with:  docker compose run --rm jmnews run-once
